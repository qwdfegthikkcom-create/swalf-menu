<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWALF - Rest & Café | سوالف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C97B3C;
  --gold-dark:#9B5A28;
  --black:#0E0E0E;
  --cream:#FAF6F1;
  --gray:#7A7A7A;
  --shadow:0 8px 30px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--black);min-height:100vh}

.splash{
  position:fixed;inset:0;background:linear-gradient(135deg,#f5e6d3 0%,#e8d4ba 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;
  transition:opacity .6s, visibility .6s;
}
.splash.hide{opacity:0;visibility:hidden}
.logo-circle{
  width:240px;height:240px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 20px 60px rgba(201,123,60,.4);
  cursor:pointer;animation:pulse 2.5s infinite;
  user-select:none;
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}
.logo-circle svg{width:55%;height:55%}
.splash-title{margin-top:30px;font-family:'Cinzel',serif;font-size:28px;letter-spacing:8px;color:var(--gold-dark)}
.splash-sub{margin-top:8px;font-size:14px;color:var(--gray);letter-spacing:3px}
.enter-btn{
  margin-top:40px;padding:14px 50px;background:var(--black);color:#fff;border:none;border-radius:50px;
  font-size:16px;font-weight:700;cursor:pointer;font-family:'Cairo';transition:.3s;
}
.enter-btn:hover{background:var(--gold);transform:translateY(-2px)}

.header{
  position:sticky;top:0;background:#fff;z-index:100;
  box-shadow:0 2px 15px rgba(0,0,0,.08);padding:12px 0;
}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:0 20px 12px;border-bottom:1px solid #f0e8dd}
.header-left{display:flex;align-items:center;gap:12px;flex:1}
.mini-logo{width:50px;height:50px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-logo svg{width:60%;height:60%}
.brand{display:flex;flex-direction:column;gap:2px}
.brand h1{font-family:'Cinzel',serif;font-size:18px;letter-spacing:4px;color:var(--gold-dark);line-height:1}
.brand p{font-size:10px;color:var(--gray);letter-spacing:2px}
.header-icons{display:flex;gap:12px;align-items:center;position:relative}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:#f5e6d3;cursor:pointer;font-size:20px;transition:.3s;position:relative}
.icon-btn:hover{background:var(--gold);color:#fff}
.cart-badge{position:absolute;top:-8px;right:-8px;background:#d33;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

.nav-categories{
  display:flex;gap:10px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;
}
.nav-categories::-webkit-scrollbar{display:none}
.cat-btn{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;padding:4px;transition:.3s;
}
.cat-icon{
  width:58px;height:58px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;
  box-shadow:0 4px 12px rgba(201,123,60,.3);transition:.3s;
}
.cat-btn.active .cat-icon{background:var(--black);transform:scale(1.08)}
.cat-btn span{font-size:11px;font-weight:700;color:var(--black);white-space:nowrap}

.section-title{
  padding:24px 20px 12px;font-size:20px;font-weight:900;color:var(--gold-dark);
  display:flex;align-items:center;gap:10px;
}
.section-title::before{content:'';width:5px;height:24px;background:var(--gold);border-radius:3px}

.menu-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 16px 30px;
}
@media(min-width:768px){.menu-grid{grid-template-columns:repeat(3,1fr);gap:18px}}
@media(min-width:1024px){.menu-grid{grid-template-columns:repeat(4,1fr);max-width:1200px;margin:0 auto}}

.card{
  background:#fff;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
  transition:.3s;position:relative;cursor:pointer;
}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 35px rgba(0,0,0,.15)}
.card.out{opacity:.5;filter:grayscale(.7)}
.card-img{width:100%;height:140px;object-fit:cover;background:#f0e8dd}
.card-body{padding:12px}
.card-name{font-size:14px;font-weight:700;color:var(--black);margin-bottom:4px;line-height:1.3;min-height:36px}
.card-desc{font-size:11px;color:var(--gray);margin-bottom:10px;min-height:28px}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.price{font-size:15px;font-weight:900;color:var(--gold-dark)}
.price small{font-size:10px;color:var(--gray);font-weight:400}
.add-btn{
  width:34px;height:34px;border-radius:50%;background:var(--gold);color:#fff;
  border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;font-weight:700;
}
.add-btn:active{transform:scale(.85);background:var(--black)}
.add-btn:disabled{background:#ccc;cursor:not-allowed}
.out-badge{position:absolute;top:10px;left:10px;background:#d33;color:#fff;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700}

.footer{background:var(--black);color:#fff;text-align:center;padding:30px 20px;margin-top:40px}
.footer p{font-size:12px;opacity:.7;margin-top:8px}

.cart-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;
  display:none;align-items:flex-end;justify-content:center;
}
.cart-modal.show{display:flex}
.cart-panel{
  background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:500px;
  max-height:80vh;overflow-y:auto;padding:20px;animation:slideUp .3s;
}
@keyframes slideUp{from{transform:translateY(100%)} to{transform:translateY(0)}}
.cart-header{
  font-size:20px;font-weight:900;color:var(--gold-dark);margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;
}
.cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray);transition:.2s}
.cart-close:hover{color:var(--black)}
.cart-item{
  display:flex;gap:12px;padding:12px;background:#f5e6d3;border-radius:12px;margin-bottom:12px;align-items:center;
}
.cart-item img{width:50px;height:50px;border-radius:8px;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-name{font-weight:700;font-size:13px;color:var(--black)}
.cart-item-price{font-size:12px;color:var(--gray);margin-top:4px}
.cart-item-controls{display:flex;gap:8px;align-items:center}
.qty-btn{width:24px;height:24px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;font-weight:700;font-size:12px;transition:.2s}
.qty-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.cart-item-qty{min-width:20px;text-align:center;font-weight:700;font-size:12px}
.cart-item-remove{background:#d33;color:#fff;border:none;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;font-weight:700;transition:.2s}
.cart-item-remove:hover{background:#b22}
.cart-empty{text-align:center;padding:40px 20px;color:var(--gray);font-size:16px}
.cart-total{background:var(--gold);color:#fff;padding:16px;border-radius:12px;margin:20px 0;text-align:center;font-weight:700;font-size:16px}
.checkout-btn{
  width:100%;padding:14px;background:var(--black);color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:.3s;
}
.checkout-btn:hover{background:var(--gold);transform:translateY(-2px)}
.checkout-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}

.admin-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.admin-overlay.show{display:flex}
.pin-box{
  background:#fff;border-radius:20px;padding:30px;width:100%;max-width:340px;text-align:center;
}
.pin-box h3{color:var(--gold-dark);margin-bottom:20px}
.pin-box input{
  width:100%;padding:14px;border:2px solid #e0d4c0;border-radius:12px;font-size:18px;
  text-align:center;letter-spacing:8px;font-weight:700;margin-bottom:14px;
}
.pin-box input:focus{outline:none;border-color:var(--gold)}
.pin-box button{
  width:100%;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;transition:.2s;
}
.pin-box button:hover{background:var(--gold-dark)}
.pin-box .cancel{background:#eee;color:#666;margin-top:8px}
.pin-box .cancel:hover{background:#ddd}

.admin-panel{
  position:fixed;inset:0;background:#fff;z-index:10001;overflow-y:auto;display:none;
}
.admin-panel.show{display:block}
.admin-header{
  background:var(--black);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:5;
}
.admin-header h2{font-size:18px;color:var(--gold)}
.close-admin{background:#d33;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700;transition:.2s}
.close-admin:hover{background:#b22}
.admin-list{padding:20px;max-width:900px;margin:0 auto;margin-bottom:80px}
.admin-item{
  background:#faf6f1;border:1px solid #ebe0cf;border-radius:12px;padding:14px;margin-bottom:12px;
  display:grid;grid-template-columns:60px 1fr auto auto auto;gap:12px;align-items:center;
}
.admin-item img{width:60px;height:60px;border-radius:10px;object-fit:cover}
.admin-item .info{font-size:13px;font-weight:700}
.admin-item .info small{display:block;color:var(--gray);font-weight:400;font-size:11px}
.admin-item input[type=number]{width:90px;padding:8px;border:1px solid #ddd;border-radius:8px;text-align:center;font-weight:700}
.toggle{position:relative;width:50px;height:26px;background:#ccc;border-radius:13px;cursor:pointer;transition:.3s}
.toggle.on{background:#22c55e}
.toggle::after{content:'';position:absolute;top:3px;right:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.3s}
.toggle.on::after{right:27px}
.save-all{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#fff;border:none;padding:14px 40px;border-radius:50px;
  font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 25px rgba(201,123,60,.5);
  z-index:10002;transition:.2s;
}
.save-all:hover{background:var(--gold-dark);transform:translateX(-50%) translateY(-2px)}
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:#22c55e;color:#fff;padding:12px 24px;border-radius:30px;font-weight:700;
  opacity:0;transition:.3s;z-index:99999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-10px)}

@media(max-width:600px){
  .admin-item{grid-template-columns:50px 1fr;gap:8px}
  .admin-item img{width:50px;height:50px}
  .admin-item > *:nth-child(n+3){grid-column:span 2}
  .header-top{padding:0 16px 12px}
  .brand h1{font-size:16px}
}
</style>
</head>
<body>

<header class="header">

<main id="menuContent"></main>

<footer class="footer">

  <p>© 2024 سوالف ريست آند كافيه - جميع الحقوق محفوظة</p>
</footer>

<div class="cart-modal" id="cartModal">
  <div class="cart-panel">
    <div class="cart-header">
      🛒 السلة
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div id="cartContent"></div>
  </div>
</div>

<div class="admin-overlay" id="pinModal">
  <div class="pin-box">
    <h3>🔐 دخول لوحة المدير</h3>
    <input type="password" id="pinInput" maxlength="6" placeholder="••••">
    <button onclick="checkPin()">دخول</button>
    <button class="cancel" onclick="closePinModal()">إلغاء</button>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h2>⚙️ لوحة تحكم المدير</h2>
    <button class="close-admin" onclick="closeAdmin()">إغلاق ✕</button>

  <div class="admin-list" id="adminList"></div>

</div>

<div class="toast" id="toast">تم الحفظ ✓</div>

    {id:26, cat:'cold', name:'عصير ليمون نعناع', desc:'طازج 100%', price:4000, img:'https://images.unsplash.com/photo-1556881286-fc6915169721?w=400', on:true},
    {id:27, cat:'cold', name:'ميلك شيك شوكولاتة', desc:'كريمي وغني', price:6000, img:'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=400', on:true},
    {id:28, cat:'hot', name:'قهوة عربية', desc:'قهوة عربية بالهيل', price:3000, img:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400', on:true},
    {id:29, cat:'hot', name:'كابتشينو', desc:'إيطالي أصلي', price:5000, img:'https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=400', on:true},
    {id:30, cat:'hot', name:'شاي عراقي', desc:'استكان شاي عراقي', price:1500, img:'https://images.unsplash.com/photo-1597481499750-3e6b22637e12?w=400', on:true},
    {id:31, cat:'hot', name:'لاتيه', desc:'لاتيه كريمي', price:5000, img:'https://images.unsplash.com/photo-1561882468-9110e03e0f78?w=400', on:true}
  ]
};

const ADMIN_PIN = '4444';
const WHATSAPP_NUMBER = '9647814567890';

let DATA = JSON.parse(localStorage.getItem('swalfMenu')) || DEFAULT_DATA;
let CART = JSON.parse(localStorage.getItem('swalfCart')) || [];

function saveData(){localStorage.setItem('swalfMenu', JSON.stringify(DATA))}
function saveCart(){localStorage.setItem('swalfCart', JSON.stringify(CART))}

function updateCartBadge(){
  const badge = document.getElementById('cartBadge');
  if(CART.length > 0){
    badge.textContent = CART.length;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

let clickCount=0, clickTimer;
document.getElementById('logoTrigger').addEventListener('click', ()=>{
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(()=>clickCount=0, 1500);
  if(clickCount>=5){
    clickCount=0;
    openPinModal();
  }
});

function enterMenu(){
  document.getElementById('splash').classList.add('hide');
  renderMenu();
  updateCartBadge();
}

function openPinModal(){
  document.getElementById('pinModal').classList.add('show');
  document.getElementById('pinInput').value='';
  setTimeout(()=>document.getElementById('pinInput').focus(),100);
}
function closePinModal(){document.getElementById('pinModal').classList.remove('show')}
function checkPin(){
  if(document.getElementById('pinInput').value===ADMIN_PIN){
    closePinModal();
    openAdmin();
  } else {
    alert('❌ كلمة المرور خاطئة');
  }
}
document.getElementById('pinInput').addEventListener('keypress',e=>{if(e.key==='Enter')checkPin()});

function renderMenu(){
  const nav = document.getElementById('navCats');
  nav.innerHTML = DATA.categories.map((c,i)=>
    `<div class="cat-btn ${i===0?'active':''}" data-cat="${c.id}" onclick="scrollToCat('${c.id}',this)">
      <div class="cat-icon">${c.icon}</div>
      <span>${c.name}</span>
    </div>`
  ).join('');

  const main = document.getElementById('menuContent');
  main.innerHTML = DATA.categories.map(c=>{
    const items = DATA.items.filter(i=>i.cat===c.id);
    if(!items.length) return '';
    return `
      <section id="sec-${c.id}">
        <h2 class="section-title">${c.icon} ${c.name}</h2>
        <div class="menu-grid">
          ${items.map(it=>`
            <div class="card ${!it.on?'out':''}">
              ${!it.on?'<div class="out-badge">نفذت الكمية</div>':''}
              <img class="card-img" src="${it.img}" alt="${it.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/C97B3C/ffffff?text=SWALF'">
              <div class="card-body">
                <div class="card-name">${it.name}</div>
                <div class="card-desc">${it.desc||''}</div>
                <div class="card-footer">
                  <button class="add-btn" onclick="addToCart(${it.id})" ${!it.on?'disabled':''}>+</button>
                  <div class="price">${it.price.toLocaleString()} <small>د.ع</small></div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    `;
  }).join('');
}

function scrollToCat(id, el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const target = document.getElementById('sec-'+id);
  if(target){
    const top = target.getBoundingClientRect().top + window.pageYOffset - 180;
    window.scrollTo({top, behavior:'smooth'});
  }
}

function addToCart(itemId){
  const item = DATA.items.find(i=>i.id===itemId);
  if(!item || !item.on) return;
  
  const cartItem = CART.find(c=>c.id===itemId);
  if(cartItem){
    cartItem.qty++;
  } else {
    CART.push({...item, qty:1});
  }
  saveCart();
  updateCartBadge();
  showToast('✓ تمت الإضافة للسلة');
}

function removeFromCart(itemId){
  CART = CART.filter(c=>c.id!==itemId);
  saveCart();
  updateCartBadge();
  renderCart();
}

function updateQty(itemId, change){
  const item = CART.find(c=>c.id===itemId);
  if(item){
    item.qty += change;
    if(item.qty <= 0) removeFromCart(itemId);
    else {
      saveCart();
      renderCart();
    }
  }
}

function renderCart(){
  const content = document.getElementById('cartContent');
  if(CART.length === 0){
    content.innerHTML = '<div class="cart-empty">🛒 السلة فارغة</div>';
    return;
  }
  
  const total = CART.reduce((sum, item)=>sum + (item.price * item.qty), 0);
  content.innerHTML = `
    ${CART.map(item=>`
      <div class="cart-item">
        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/50'">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${item.price.toLocaleString()} د.ع</div>
        </div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
          <span class="cart-item-qty">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
          <button class="cart-item-remove" onclick="removeFromCart(${item.id})">حذف</button>
        </div>
      </div>
    `).join('')}
    <div class="cart-total">المجموع: ${total.toLocaleString()} د.ع</div>
    <button class="checkout-btn" onclick="checkout()">✓ إتمام الطلب عبر الواتس</button>
  `;
}

function openCart(){
  document.getElementById('cartModal').classList.add('show');
  renderCart();
}

function closeCart(){
  document.getElementById('cartModal').classList.remove('show');
}

function checkout(){
  if(CART.length === 0) return;
  const total = CART.reduce((sum, item)=>sum + (item.price * item.qty), 0);
  const items = CART.map(i=>`• ${i.name} x${i.qty}`).join('%0A');
  const msg = `السلام عليكم 👋%0A%0A📦 طلب جديد:%0A${items}%0A%0A💰 المجموع: ${total.toLocaleString()} د.ع`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
  CART = [];
  saveCart();
  updateCartBadge();
  closeCart();
  showToast('✓ تم إرسال الطلب');
}

function openAdmin(){
  document.getElementById('adminPanel').classList.add('show');
  const list = document.getElementById('adminList');
  list.innerHTML = DATA.items.map(it=>`
    <div class="admin-item">
      <img src="${it.img}" onerror="this.src='https://via.placeholder.com/60'">
      <div class="info">${it.name}<small>${DATA.categories.find(c=>c.id===it.cat)?.name||''}</small></div>
      <input type="number" value="${it.price}" data-id="${it.id}" data-field="price">
      <div class="toggle ${it.on?'on':''}" data-id="${it.id}" onclick="this.classList.toggle('on')"></div>
      <input type="text" placeholder="رابط صورة جديد" data-id="${it.id}" data-field="img" style="width:140px;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:11px">
    </div>
  `).join('');
}
function closeAdmin(){document.getElementById('adminPanel').classList.remove('show')}

function saveAll(){
  document.querySelectorAll('.admin-item').forEach(row=>{
    const priceInput = row.querySelector('input[data-field="price"]');
    const imgInput = row.querySelector('input[data-field="img"]');
    const toggle = row.querySelector('.toggle');
    const id = parseInt(priceInput.dataset.id);
    const item = DATA.items.find(i=>i.id===id);
    if(item){
      item.price = parseInt(priceInput.value)||0;
      if(imgInput.value.trim()) item.img = imgInput.value.trim();
      item.on = toggle.classList.contains('on');
    }
  });
  saveData();
  renderMenu();
  showToast('✓ تم حفظ كل التعديلات');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

window.addEventListener('load', ()=>{
  renderMenu();
  updateCartBadge();
});

document.getElementById('cartModal').addEventListener('click', (e)=>{
  if(e.target.id==='cartModal') closeCart();
});
</script>
</body>
</html>
